name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  # ── Gates: nothing publishes from a red tree ─────────────────────────────────
  # Tags are cut by a human (RELEASING.md); nothing structurally guarantees the
  # tagged commit ever saw CI, so the release re-earns it here. `test` re-runs
  # the fast deterministic + bash suites on THIS commit; `e2e` runs the live
  # L5 suite on both OSes (the reusable E2E workflow — before this, e2e.yml's
  # own `tags` trigger raced the publish instead of gating it). The build jobs
  # start in parallel — only the publish step below waits on the gates.
  test:
    runs-on: ubuntu-latest
    env:
      CI: "1"
      INSTA_UPDATE: "no"
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
      - name: deterministic suite (L1-L4)
        run: nix develop -c cargo test --workspace --all-features
      - name: bash hook + installer tests
        run: nix develop -c just test-bash

  e2e:
    uses: ./.github/workflows/e2e.yml
    permissions:
      contents: read
      issues: write

  # ── The wasm, built once on nix ────────────────────────────────────────────
  # nix cleanly handles zellij-tile's openssl-sys build dep (plain cargo would
  # need apt libssl-dev/pkg-config), and every CLI build embeds THIS artifact
  # (build.rs picks it up via ZJ_RADAR_WASM_PATH), so the CLI runners need no
  # wasm target and no inline wasm compile.
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - name: Build wasm
        run: nix build .#zj-radar -L
      - name: Stage wasm
        run: cp result/bin/zj_radar.wasm zj_radar.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: zj_radar.wasm

  # ── Portable CLI binaries (plain cargo, NOT nix) ───────────────────────────
  # The CLI ships to non-nix machines via the curl|sh installer, so the binaries
  # must be portable. A nix-built Linux binary bakes a /nix/store ELF interpreter
  # path and fails to exec anywhere else, so Linux builds use the fully-static
  # `*-musl` target. macOS links only the always-present libSystem. Asset names
  # are the Rust target triple so `cargo binstall` and the installer share one
  # mapping. The wasm built above is embedded via ZJ_RADAR_WASM_PATH.
  #
  # No x86_64 macOS: the audience is overwhelmingly Apple Silicon, and `macos-13`
  # (Intel) is GitHub's scarcest runner — it queues for minutes and blocks every
  # release (the `release` job needs the whole matrix). Intel-mac users fall back
  # to `cargo install zj-radar` (the installer says so).
  build-cli:
    needs: build-wasm
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: actions/download-artifact@v4
        with:
          name: wasm
          path: .

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        env:
          ZJ_RADAR_WASM_PATH: ${{ github.workspace }}/zj_radar.wasm
        run: cargo build --release --locked --bin zj-radar --target ${{ matrix.target }}

      - name: Stage CLI artifact
        run: tar -czf "zj-radar-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" zj-radar

      - uses: actions/upload-artifact@v4
        with:
          name: zj-radar-${{ matrix.target }}
          path: zj-radar-${{ matrix.target }}.tar.gz

  release:
    needs: [build-wasm, build-cli, test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$tag) does not match Cargo.toml version $manifest" >&2
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches Cargo.toml version $manifest"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Publish a `.sha256` sidecar next to EVERY binary artifact — the wasm
      # (verified by `zj-radar setup zellij --download` and `run`'s first-use
      # fetch) and each CLI tarball (verified by scripts/install.sh) — so
      # installs check integrity, not just TLS. Consumers parse the first
      # token, so the standard sha256sum "<hex>  <name>" line works as-is.
      - name: Checksum the artifacts
        run: |
          cd dist
          for f in zj_radar.wasm zj-radar-*.tar.gz; do
            sha256sum "$f" > "$f.sha256"
          done
          cat ./*.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # A semver pre-release tag (v0.1.0-rc.1, v0.2.0-beta) is marked
          # pre-release so it never becomes `latest` — let RCs shake out the
          # pipeline without misleading the curl|sh installer's /latest/ URL.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/zj_radar.wasm
            dist/zj_radar.wasm.sha256
            scripts/install.sh
            dist/zj-radar-*.tar.gz
            dist/zj-radar-*.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true

  # ── The stranger test: README quickstart verbatim against THESE assets ──────
  # RELEASING.md step 6, automated: a pristine container runs the installer,
  # `setup zellij --download --inject --yes`, and a real Zellij on a PTY —
  # asserting the pre-seeded grant (rail renders, no permission prompt) and
  # cwd-driven tab naming. ZJ_RADAR_VERSION pins every download to this tag,
  # so prereleases are covered and there is no `latest` race. Don't announce
  # a release until this job is green.
  verify-funnel:
    needs: release
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run the fresh-machine funnel against the published assets
        env:
          ZJ_RADAR_VERSION: ${{ github.ref_name }}
        run: bash scripts/funnel.sh
