name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  # ── Portable CLI binaries (plain cargo, NOT nix) ───────────────────────────
  # The CLI is shipped to non-nix machines via the curl|sh installer, so the
  # binaries must be portable. A nix-built Linux binary bakes a /nix/store ELF
  # interpreter path and fails to exec anywhere else, so Linux builds use the
  # fully-static `*-musl` target (the CLI's deps are pure Rust — no C, no
  # openssl — so musl links self-contained without musl-gcc). macOS links only
  # the always-present libSystem, so a native cargo build is already portable.
  # Asset names are the Rust target triple so `cargo binstall` and the installer
  # share one mapping. (wasm stays on nix in the `release` job — see below.)
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --locked --features cli --bin zj-radar --target ${{ matrix.target }}

      - name: Stage CLI artifact
        run: tar -czf "zj-radar-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" zj-radar

      - uses: actions/upload-artifact@v4
        with:
          name: zj-radar-${{ matrix.target }}
          path: zj-radar-${{ matrix.target }}.tar.gz

  release:
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$tag) does not match Cargo.toml version $manifest" >&2
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches Cargo.toml version $manifest"

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Reuse the same /nix cache CI populates so a release isn't a cold build.
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      # wasm stays on nix: it cleanly handles zellij-tile's openssl-sys build dep
      # (plain cargo would need apt libssl-dev/pkg-config), and wasm portability
      # is a non-issue since Zellij loads it.
      - name: Build wasm
        run: nix build .#zj-radar -L

      - name: Stage wasm artifact
        run: cp result/bin/zj_radar.wasm zj_radar.wasm

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zj_radar.wasm
            scripts/install.sh
            dist/*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
