name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: zj-radar-linux-x86_64
          - os: macos-14
            artifact: zj-radar-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Build native CLI
        run: nix build .#zj-radar-cli -L

      - name: Stage CLI artifact
        run: tar -czf "${{ matrix.artifact }}.tar.gz" -C result/bin zj-radar

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$tag) does not match Cargo.toml version $manifest" >&2
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches Cargo.toml version $manifest"

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Reuse the same /nix cache CI populates so a release isn't a cold build.
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Build wasm
        run: nix build .#zj-radar -L

      - name: Stage artifact
        run: cp result/bin/zj_radar.wasm zj_radar.wasm

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zj_radar.wasm
            dist/*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
