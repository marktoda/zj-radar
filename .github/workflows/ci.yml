name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *" # nightly hermetic check (see the `hermetic` job)

# These jobs only read the repo; scope the default token down accordingly.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a quick follow-up push doesn't pay
# for the previous run's remaining minutes — but never cancel an in-flight
# MAIN build: back-to-back merges would leave main unverified until the last
# run finishes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Fast feedback on every push / PR (~2-3 min) ────────────────────────────
  # clippy + deterministic tests + a wasm compile-check + the bash hook tests,
  # all via the nix dev shell (identical toolchain to local dev). These produce
  # the same correctness signal the old `nix flake check` job did, but in a
  # fraction of the time: clippy/test/check skip the release-mode codegen that
  # made `nix flake check` rebuild the ~250-crate tree THREE times (host + cli +
  # wasm) for ~10 min. Swatinem/rust-cache keeps ./target + ~/.cargo incremental
  # across runs; the nix-store cache just avoids re-substituting the toolchain.
  #
  # NOTE: no `cargo fmt --check` — this project does NOT use rustfmt. The
  # codebase is intentionally hand-formatted (aligned one-line multi-field
  # structs etc.). Never add a fmt gate or run `cargo fmt --all`.
  checks:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    env:
      CI: "1"
      INSTA_UPDATE: "no"
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
      # --workspace --all-targets so test/example code is linted too;
      # --all-features covers the off-by-default `e2e` flag.
      - name: clippy
        run: nix develop -c cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: deterministic suite (L1-L4)
        run: nix develop -c cargo test --workspace --all-features
      - name: wasm plugin compiles
        run: nix develop -c cargo build --target wasm32-wasip1 -p zj-radar-plugin
      - name: bash hook tests (L3, runs shellcheck + bats)
        run: nix develop -c just test-bash

  # ── macOS platform coverage ────────────────────────────────────────────────
  test-macos:
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    env:
      CI: "1"
      INSTA_UPDATE: "no"
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
      - name: deterministic suite (L1-L4)
        run: nix develop -c cargo test --workspace --all-features
      # notify.sh and install.sh run on real macOS machines (BSD userland, not
      # GNU) — the E2BIG argv bug only surfaced when Linux CI first ran the
      # bash suite, and the mirror-image platform bug would need this.
      - name: bash hook + installer tests (L3)
        run: nix develop -c just test-bash

  # ── MSRV honesty check ─────────────────────────────────────────────────────
  # `rust-version` in Cargo.toml is a published claim, but dev and the jobs
  # above all track stable — nothing else would notice the real floor silently
  # rising past the claim. Builds with exactly the declared toolchain; the
  # version is read from the manifest, so bumping Cargo.toml is the whole edit.
  msrv:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: read rust-version from Cargo.toml
        id: msrv
        run: echo "version=$(sed -n 's/^rust-version *= *"\(.*\)"/\1/p' Cargo.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo check on the declared MSRV
        run: cargo check --workspace --all-features --locked
        env:
          # rust-toolchain.toml pins `stable` for dev shells; override it so
          # the MSRV toolchain is the one that actually builds here.
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}

  # ── Hermetic crane build (slow, ~10 min) ───────────────────────────────────
  # The ONLY thing that exercises crane's source filter, so it catches
  # source-filter / reproducibility regressions the cargo jobs miss — e.g. an
  # `include_str!` pulling in a file that isn't whitelisted in flake.nix's `src`
  # filter (exactly the bug that broke CI before this rewrite). Kept off the
  # every-push path: runs nightly and on PRs targeting `main`.
  hermetic:
    if: github.event_name == 'schedule' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write   # nightly-failure-issue (scheduled runs only)
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - name: nix flake check (hermetic clippy + tests + wasm build)
        run: nix flake check -L
      - name: file a failure issue (nightly visibility)
        if: failure() && github.event_name == 'schedule'
        uses: ./.github/actions/nightly-failure-issue
        with:
          token: ${{ github.token }}

  # ── Dependency advisories (nightly) ──────────────────────────────────────────
  # zj-radar ships static binaries and a wasm artifact to end users; a RUSTSEC
  # advisory in a transitive dep would otherwise surface only via a user
  # report. Nightly (not per-PR) on purpose: the advisory DB updates daily, so
  # a per-PR gate fails PRs for problems they didn't introduce. Config in
  # deny.toml; run `cargo deny check` locally to reproduce.
  deny:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write   # nightly-failure-issue
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses sources
      - name: file a failure issue (nightly visibility)
        if: failure() && github.event_name == 'schedule'
        uses: ./.github/actions/nightly-failure-issue
        with:
          token: ${{ github.token }}
