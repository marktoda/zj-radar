name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * *" # nightly hermetic check (see the `hermetic` job)

# Cancel superseded runs on the same ref so a quick follow-up push doesn't pay
# for the previous run's remaining minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast feedback on every push / PR (~2-3 min) ────────────────────────────
  # clippy + deterministic tests + a wasm compile-check + the bash hook tests,
  # all via the nix dev shell (identical toolchain to local dev). These produce
  # the same correctness signal the old `nix flake check` job did, but in a
  # fraction of the time: clippy/test/check skip the release-mode codegen that
  # made `nix flake check` rebuild the ~250-crate tree THREE times (host + cli +
  # wasm) for ~10 min. Swatinem/rust-cache keeps ./target + ~/.cargo incremental
  # across runs; the nix-store cache just avoids re-substituting the toolchain.
  #
  # NOTE: no `cargo fmt --check` — this project does NOT use rustfmt. The
  # codebase is intentionally hand-formatted (aligned one-line multi-field
  # structs etc.). Never add a fmt gate or run `cargo fmt --all`.
  checks:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    env:
      CI: "1"
      INSTA_UPDATE: "no"
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
      # --all-targets so test/example code is linted too; --all-features covers
      # the `cli` feature (the only real feature besides the off-by-default `e2e`).
      - name: clippy
        run: nix develop -c cargo clippy --all-targets --all-features -- -D warnings
      - name: deterministic suite (L1-L4)
        run: nix develop -c cargo test --all-features
      - name: wasm plugin compiles
        run: nix develop -c cargo build --target wasm32-wasip1
      - name: bash hook tests (L3, runs shellcheck + bats)
        run: nix develop -c just test-bash

  # ── macOS platform coverage ────────────────────────────────────────────────
  test-macos:
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    env:
      CI: "1"
      INSTA_UPDATE: "no"
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
      - name: deterministic suite (L1-L4)
        run: nix develop -c cargo test --all-features

  # ── Hermetic crane build (slow, ~10 min) ───────────────────────────────────
  # The ONLY thing that exercises crane's source filter, so it catches
  # source-filter / reproducibility regressions the cargo jobs miss — e.g. an
  # `include_str!` pulling in a file that isn't whitelisted in flake.nix's `src`
  # filter (exactly the bug that broke CI before this rewrite). Kept off the
  # every-push path: runs nightly and on PRs targeting `main`.
  hermetic:
    if: github.event_name == 'schedule' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - name: nix flake check (hermetic clippy + tests + wasm build)
        run: nix flake check -L
